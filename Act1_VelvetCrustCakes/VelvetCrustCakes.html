<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Crust · interactive cake cart + gallery</title>
    <!-- Font Awesome 6 (free) for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #faf3eb;
            background-image: radial-gradient(rgba(230, 200, 180, 0.15) 1px, transparent 1px);
            background-size: 32px 32px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 1.5rem 3rem;
        }

        .page-wrapper {
            max-width: 1440px;
            width: 100%;
        }

        /* --- FLOATING GLASSMORPHISM CARD (centered) --- */
        .floating-card {
            margin: 0 auto 4rem auto;
            max-width: 880px;
            width: 100%;
            background: rgba(255, 248, 240, 0.65);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 48px;
            border: 1px solid rgba(255, 245, 235, 0.7);
            box-shadow: 0 25px 50px -10px rgba(140, 80, 40, 0.25), 0 0 0 1px rgba(255, 235, 215, 0.5) inset;
            padding: 2rem 2.2rem;
            transition: transform 0.2s ease;
        }

        .floating-card:hover {
            transform: scale(1.01) translateY(-4px);
            box-shadow: 0 35px 55px -12px rgba(120, 70, 30, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px dashed rgba(210, 160, 120, 0.3);
            padding-bottom: 1rem;
        }

        .card-header i {
            font-size: 2.2rem;
            color: #c77d5a;
            filter: drop-shadow(0 2px 4px rgba(180, 100, 50, 0.2));
        }

        .card-header h1 {
            font-size: 2.1rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: #4f3a2b;
        }

        .card-header .bakery-status {
            font-weight: 300;
            font-size: 1rem;
            background: rgba(200, 140, 100, 0.2);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            margin-left: auto;
            color: #5e3f2e;
            border: 1px solid #eed6c0;
        }

        /* --- CART SUMMARY (new) --- */
        .cart-summary {
            background: rgba(245, 225, 205, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.8rem 1.8rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #fadbc0;
            color: #4a3729;
        }

        .cart-summary .cart-icon {
            font-size: 1.4rem;
            color: #b3764b;
            margin-right: 0.5rem;
        }

        .cart-count-badge {
            background: #c99062;
            color: white;
            border-radius: 40px;
            padding: 0.2rem 1rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .clear-cart {
            background: transparent;
            border: 1.5px solid #dbb594;
            color: #5c3f2b;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.1s ease;
            font-size: 0.85rem;
        }

        .clear-cart:hover {
            background: #f4dfcf;
            border-color: #b3764b;
        }

        /* SOFT CREAM BUTTONS */
        .cream-button {
            background: #fef7e9;
            border: 1.5px solid #ffdec2;
            color: #603f28;
            font-weight: 550;
            font-size: 1.05rem;
            padding: 0.9rem 1.8rem;
            border-radius: 60px;
            box-shadow: 0 8px 14px -6px rgba(190, 140, 90, 0.2), 0 2px 0 0 #ffffffb0 inset;
            backdrop-filter: blur(4px);
            transition: all 0.15s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            white-space: nowrap;
            line-height: 1;
        }

        .cream-button:hover {
            background: #fffbf2;
            border-color: #f2bc91;
            box-shadow: 0 10px 18px -8px #b68b66, 0 2px 0 0 #ffe8d4 inset;
            transform: translateY(-2px);
            color: #442f1f;
        }

        .step-flow {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem 1rem;
            margin: 1.8rem 0 0.8rem;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 245, 230, 0.4);
            padding: 0.25rem 0.5rem 0.25rem 1rem;
            border-radius: 100px;
            backdrop-filter: blur(2px);
        }

        .step-text {
            font-weight: 500;
            color: #593e2b;
        }

        .step-item .cream-button {
            padding: 0.5rem 1.5rem;
            font-size: 0.95rem;
        }

        .arrow-connector {
            font-size: 1.6rem;
            color: #dbb594;
            font-weight: 200;
            margin: 0 0.1rem;
        }

        .schedule-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
            margin-top: 2rem;
            padding-top: 0.8rem;
            border-top: 1px dashed rgba(200, 160, 130, 0.4);
            align-items: center;
        }

        .schedule-tags .badge {
            background: rgba(255, 240, 220, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 1rem;
            color: #523e2c;
            border: 1px solid #f7dbbc;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .badge i {
            color: #c28b5c;
        }

        /* --- MASONRY GRID (interactable cards) --- */
        .grid-section {
            max-width: 1280px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 350;
            color: #4b3622;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            border-left: 8px solid #e7b28e;
            padding-left: 1.5rem;
        }

        .masonry-grid {
            column-count: 3;
            column-gap: 1.5rem;
            width: 100%;
        }

        /* cake card — now interactive (click to toggle cart) */
        .cake-card {
            display: inline-block;
            margin-bottom: 1.5rem;
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 18px 30px -12px rgba(90, 60, 30, 0.2);
            transition: all 0.2s;
            background: #fff6ed;
            border: 2px solid transparent;  /* border changes when in cart */
            cursor: pointer;
            position: relative;
        }

        .cake-card.in-cart {
            border: 3px solid #c99062;
            box-shadow: 0 0 0 2px #fae4cd, 0 25px 35px -10px #9f7c5f;
        }

        .cake-card img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            background: #edd7c5;
            transition: transform 0.3s ease;
            pointer-events: none;  /* click goes to card */
        }

        .cake-card:hover img {
            transform: scale(1.02);
        }

        .cake-caption {
            padding: 0.8rem 1rem 1rem;
            background: rgba(255, 247, 235, 0.7);
            backdrop-filter: blur(4px);
            font-size: 0.9rem;
            color: #4b3c2e;
            border-top: 1px solid #f7dcc5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
        }

        .cake-caption span {
            background: #fff0e0;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid #ebc7a8;
        }

        /* cart indicator on image corner */
        .cart-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #c99062;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            border: 2px solid #fff3e0;
        }

        .cake-card.in-cart .cart-indicator {
            opacity: 1;
        }

        /* responsiveness */
        @media (max-width: 900px) {
            .masonry-grid {
                column-count: 2;
            }
            .step-flow {
                flex-direction: column;
                align-items: start;
            }
            .arrow-connector {
                transform: rotate(90deg);
                margin: 0.2rem 0;
            }
        }

        @media (max-width: 550px) {
            .masonry-grid {
                column-count: 1;
            }
            .floating-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <!-- floating glassmorphism card -->
    <div class="floating-card">
        <div class="card-header">
            <img src="velvetlogo.png" width=60% height=150>
            <span class="bakery-status"><i class="far fa-clock"></i> open 10–7</span>
        </div>

        <!-- CART SUMMARY (dynamic) -->
        <div class="cart-summary" id="cartSummary">
            <div style="display: flex; align-items: center; gap: 0.3rem;">
                <i class="fas fa-shopping-basket cart-icon"></i>
                <span>my cake cart</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.8rem;">
                <span class="cart-count-badge" id="cartCount">0</span>
                <button class="clear-cart" id="clearCartBtn"><i class="fas fa-trash-alt"></i> clear</button>
            </div>
        </div>

        <!-- schedule tags: Orders, Design, Pickup -->
        <div class="schedule-tags">
            <div class="badge"><i class="fas fa-clipboard-list"></i> Orders · daily</div>
            <div class="badge"><i class="fas fa-pencil-ruler"></i> Design · custom</div>
            <div class="badge"><i class="fas fa-store-alt"></i> Pickup · 24h notice</div>
            <div class="badge"><i class="fas fa-calendar-check"></i> Schedule consult</div>
        </div>

        <!-- step flow: Browse Designs → Customize Flavors → Pick Date → Confirm Order -->
        <div class="step-flow">
            <div class="step-item">
                <span class="step-text">1. Browse</span>
                <button class="cream-button"><i class="fas fa-images"></i> Designs</button>
            </div>
            <span class="arrow-connector">→</span>
            <div class="step-item">
                <span class="step-text">2. Customize</span>
                <button class="cream-button"><i class="fas fa-ice-cream"></i> Flavors</button>
            </div>
            <span class="arrow-connector">→</span>
            <div class="step-item">
                <span class="step-text">3. Pick</span>
                <button class="cream-button"><i class="fas fa-calendar-alt"></i> Date</button>
            </div>
            <span class="arrow-connector">→</span>
            <div class="step-item">
                <span class="step-text">4. Finalize</span>
                <button class="cream-button"><i class="fas fa-check-circle"></i> Confirm Order</button>
            </div>
        </div>

        <!-- extra soft cream buttons -->
        <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1.8rem; justify-content: center;">
            <button class="cream-button"><i class="fas fa-heart"></i> favorites</button>
            <button class="cream-button"><i class="fas fa-gift"></i> gift wrap</button>
            <button class="cream-button"><i class="fas fa-truck"></i> delivery</button>
        </div>
        <p style="text-align: center; margin-top: 1.2rem; color: #836b53; font-size: 0.85rem; opacity: 0.7;">
            ✦ handcrafted layer cakes · order 48h in advance ✦
        </p>
    </div>

    <!-- MASONRY GRID: interactive cake gallery with cart status -->
    <div class="grid-section">
        <h2 class="section-title"><i class="fas fa-camera" style="margin-right: 10px;"></i> tap any cake to add to cart ✦ in-cart border appears</h2>
        <div class="masonry-grid" id="masonryGrid">
            <!-- cake cards will be populated with JS (interactive) -->
        </div>
        <p style="text-align: right; margin-top: 1rem; font-size: 0.85rem; color: #ad8b72;">
            <i class="fas fa-hand-pointer"></i> click on any cake — it toggles in/out of your cart
        </p>
    </div>
</div>

<script>
    (function() {
        // ---------- CAKE DATA (high-res unsplash) ----------
        const cakes = [
            { id: 'cake1', name: 'raspberry velvet', code: '#12', img: 'https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?q=80&w=1950&auto=format&fit=crop', icon: 'fa-berry' },
            { id: 'cake2', name: 'dark bronze', code: '#07', img: 'https://images.unsplash.com/photo-1605807646983-377bc5a76493?q=80&w=1928&auto=format&fit=crop', icon: 'fa-cocoa' },
            { id: 'cake3', name: 'garden crust', code: '#04', img: 'https://images.unsplash.com/photo-1464349095431-e961b1d40f3a?q=80&w=1936&auto=format&fit=crop', icon: 'fa-seedling' },
            { id: 'cake4', name: 'gold vein', code: '#21', img: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=1989&auto=format&fit=crop', icon: 'fa-crown' },
            { id: 'cake5', name: 'fruit burst', code: '#09', img: 'https://images.unsplash.com/photo-1565958011703-44f9829ba187?q=80&w=1965&auto=format&fit=crop', icon: 'fa-apple-alt' },
            { id: 'cake6', name: 'whisper cream', code: '#02', img: 'https://images.unsplash.com/photo-1535141192574-5d4897c12636?q=80&w=1964&auto=format&fit=crop', icon: 'fa-feather-alt' },
            { id: 'cake7', name: 'party dots', code: '#15', img: 'https://images.unsplash.com/photo-1558301211-0d8c8ddee6f6?q=80&w=1964&auto=format&fit=crop', icon: 'fa-birthday-cake' },
            { id: 'cake8', name: 'glaze geode', code: '#33', img: 'https://images.unsplash.com/photo-1621303837174-89787a7e4729?q=80&w=1936&auto=format&fit=crop', icon: 'fa-palette' },
            { id: 'cake9', name: 'rose rustic', code: '#41', img: 'https://images.unsplash.com/photo-1557979619-445218f326b7?q=80&w=1974&auto=format&fit=crop', icon: 'fa-rose' },
            { id: 'cake10', name: 'croquant', code: '#50', img: 'https://images.unsplash.com/photo-1623428187969-395c2a79e36e?q=80&w=1964&auto=format&fit=crop', icon: 'fa-stack-overflow' },
            { id: 'cake11', name: 'ivory bloom', code: '#26', img: 'https://images.unsplash.com/photo-1571115177098-24ec42ed204d?q=80&w=1887&auto=format&fit=crop', icon: 'fa-dove' }
        ];

        // ---------- CART STATE (set of cake ids) ----------
        let cartItems = new Set();

        // DOM elements
        const grid = document.getElementById('masonryGrid');
        const cartCountSpan = document.getElementById('cartCount');
        const clearBtn = document.getElementById('clearCartBtn');

        // Helper: update cart display
        function updateCartUI() {
            cartCountSpan.textContent = cartItems.size;
            // update all cards' in-cart class
            document.querySelectorAll('.cake-card').forEach(card => {
                const cakeId = card.dataset.id;
                if (cartItems.has(cakeId)) {
                    card.classList.add('in-cart');
                } else {
                    card.classList.remove('in-cart');
                }
            });
        }

        // Toggle cake in cart
        function toggleCake(cakeId) {
            if (cartItems.has(cakeId)) {
                cartItems.delete(cakeId);
            } else {
                cartItems.add(cakeId);
            }
            updateCartUI();
        }

        // Clear all
        function clearCart() {
            cartItems.clear();
            updateCartUI();
        }

        // Render masonry grid
        function renderGrid() {
            let html = '';
            cakes.forEach(cake => {
                // use font-awesome icon class; fallback to fa-cake-slice if needed
                const iconClass = cake.icon || 'fa-cake-candles';
                html += `
                    <div class="cake-card" data-id="${cake.id}" id="card-${cake.id}">
                        <img src="${cake.img}" alt="${cake.name}" loading="lazy">
                        <div class="cart-indicator"><i class="fas fa-check"></i></div>
                        <div class="cake-caption">
                            <span><i class="fas ${iconClass}"></i> ${cake.name}</span>
                            <span>design ${cake.code}</span>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;

            // attach click listeners to each card
            document.querySelectorAll('.cake-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    // avoid toggling if clear button or anything inside (but no inner buttons)
                    const cakeId = card.dataset.id;
                    toggleCake(cakeId);
                });
            });
        }

        // clear button listener
        clearBtn.addEventListener('click', (e) => {
            e.stopPropagation();  // avoid weird bubbling
            clearCart();
        });

        // initialize
        renderGrid();
        updateCartUI();  // cart empty at start

        // optional: the step buttons and cream buttons are non-functional but look pretty
        // we also want to ensure that any click on cart summary clear is isolated.
        // Also maybe simulate that "Browse Designs" button shows gallery (already visible)
        // Could add a tiny effect: if you click on "Designs" button, flash message (just for fun)
        const designBtn = document.querySelector('.step-item .cream-button');
        if (designBtn) {
            designBtn.addEventListener('click', () => {
                alert('✨ Browse our cakes below — click any to add to cart!');
            });
        }
    })();
</script>
<!-- ensure that unsplash images are loaded with high resolution -->
</body>
</html>
