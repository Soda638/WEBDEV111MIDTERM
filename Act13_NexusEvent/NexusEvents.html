<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nexus Events</title>
  <!-- Google Fonts: bold, urban, rock edge -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&family=Oswald:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #F5F1E8;  /* raw paper background */
      font-family: 'Inter', 'Oswald', sans-serif;
      color: #111;
      line-height: 1.3;
    }

    /* MAIN CONTAINER – modern poster layout */
    .poster-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ----- MODERN POSTER STYLE: BOLD TYPOGRAPHY & LARGE BUY BUTTONS ----- */
    .hero-poster {
      text-align: center;
      margin-bottom: 3rem;
      border-bottom: 4px solid #000;
      padding-bottom: 2rem;
    }

    .tagline {
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #D64045;
      background: #FFF3E0;
      display: inline-block;
      padding: 0.3rem 1.5rem;
      border: 3px solid black;
      box-shadow: 6px 6px 0 #000;
      margin-top: 0.5rem;
      font-family: 'Oswald', monospace;
    }

    /* LARGE BUY BUTTONS (top/bottom modern poster style) */
    .buy-banner {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      margin: 2rem 0 1rem;
      flex-wrap: wrap;
    }

    .btn-buy-large {
      background: #FFCF40;
      border: 3px solid #000;
      box-shadow: 8px 8px 0 #000;
      font-weight: 900;
      font-size: 1.6rem;
      padding: 1rem 2.2rem;
      text-transform: uppercase;
      font-family: 'Bebas Neue', 'Oswald', sans-serif;
      letter-spacing: 2px;
      transition: all 0.12s ease;
      cursor: pointer;
      color: #111;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .btn-buy-large i {
      font-size: 1.8rem;
    }

    .btn-buy-large:hover {
      transform: translate(-4px, -4px);
      box-shadow: 12px 12px 0 #000;
      background: #FFE082;
    }

    .btn-buy-large:active {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0 #000;
    }

    /* bottom buy area */
    .bottom-buy-area {
      margin-top: 4rem;
      text-align: center;
      border-top: 4px solid #000;
      padding-top: 2rem;
    }

    /* ----- NEUBRUTALISM CARD: heavy drop shadows, oversized buttons ----- */
    .neubrutalism-card {
      background: #FFFFFF;
      border: 3px solid #111;
      box-shadow: 14px 14px 0 #111;
      padding: 2rem;
      transition: 0.1s linear;
    }

    /* STEP INDICATOR */
    .flow-steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2rem;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .step-badge {
      background: #F0EDE8;
      border: 2px solid black;
      padding: 0.7rem 1rem;
      font-weight: 800;
      font-size: 0.9rem;
      text-transform: uppercase;
      flex: 1;
      text-align: center;
      box-shadow: 5px 5px 0 rgba(0,0,0,0.15);
      font-family: 'Oswald', monospace;
    }

    .step-badge.active {
      background: #111;
      color: #FFCF40;
      box-shadow: 6px 6px 0 #FFCF40;
      border-color: #FFCF40;
    }

    /* event selection grid - genre themed cards */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }

    .event-option {
      background: white;
      border: 3px solid black;
      box-shadow: 10px 10px 0 rgba(0,0,0,0.2);
      padding: 1.8rem 1.5rem;
      transition: 0.1s;
      cursor: pointer;
      position: relative;
    }

    .event-option:hover {
      transform: translate(-3px, -3px);
      box-shadow: 14px 14px 0 black;
    }

    /* genre-specific accent borders */
    .event-option.hiphop {
      border-left: 12px solid #F4A261;
    }
    .event-option.rock {
      border-left: 12px solid #E63946;
    }
    .event-option.pop {
      border-left: 12px solid #FF2D75;
    }

    .genre-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .event-name {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .event-details {
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      gap: 1rem;
      margin: 0.8rem 0;
      color: #3b3b3b;
      flex-wrap: wrap;
    }

    .genre-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.2rem 0.8rem;
      background: #000;
      color: white;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .btn-oversized {
      background: #111;
      color: white;
      border: 2px solid black;
      padding: 14px 20px;
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      width: 100%;
      text-align: center;
      cursor: pointer;
      box-shadow: 6px 6px 0 #D64045;
      transition: 0.05s linear;
      margin-top: 1rem;
      font-family: 'Oswald', monospace;
    }

    .btn-oversized:active {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 #D64045;
    }

    /* ticket tiers - oversized button style */
    .tiers-container {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin: 1.5rem 0;
    }

    .tier-button {
      background: #FAF7F0;
      border: 2.5px solid #000;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 800;
      font-size: 1.2rem;
      box-shadow: 7px 7px 0 #000;
      cursor: pointer;
      transition: all 0.08s linear;
    }

    .tier-button.active-tier {
      background: #FFCF40;
      box-shadow: 3px 3px 0 #000;
      transform: translate(4px, 4px);
      border-color: #000;
    }

    .tier-name {
      text-transform: uppercase;
      font-weight: 800;
    }

    .tier-price {
      background: black;
      color: #FFCF40;
      padding: 0.2rem 0.8rem;
      font-size: 1rem;
      font-weight: 800;
    }

    /* forms */
    .attendee-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin: 1.8rem 0;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .input-group label {
      font-weight: 800;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .input-group input {
      padding: 12px 14px;
      border: 2px solid black;
      background: white;
      font-size: 1rem;
      font-weight: 500;
      font-family: inherit;
      box-shadow: 4px 4px 0 #ccc;
      transition: 0.1s;
    }

    .input-group input:focus {
      outline: none;
      box-shadow: 5px 5px 0 #FFCF40;
      border-color: #000;
    }

    /* QR section */
    .qr-card {
      text-align: center;
      padding: 1rem;
    }

    .qr-code-box {
      background: white;
      padding: 1rem;
      display: inline-block;
      border: 3px solid black;
      box-shadow: 12px 12px 0 #111;
      margin: 1rem 0;
    }

    canvas#qrCanvas {
      width: 180px;
      height: 180px;
      display: block;
      margin: 0 auto;
    }

    .ticket-summary {
      background: #F3F0E6;
      padding: 1rem;
      font-weight: 600;
      border-left: 8px solid #FFCF40;
    }

    /* navigation buttons */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      gap: 1rem;
    }

    .btn-nav {
      background: #E6E2D4;
      border: 2px solid black;
      font-weight: 800;
      padding: 0.8rem 1.8rem;
      font-size: 1rem;
      text-transform: uppercase;
      box-shadow: 5px 5px 0 #111;
      cursor: pointer;
      transition: 0.05s linear;
    }

    .btn-nav:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #111;
    }

    .btn-primary {
      background: #111;
      color: #FFCF40;
      box-shadow: 6px 6px 0 #FFCF40;
    }

    .btn-nav:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status-message {
      background: #FFECB3;
      border-left: 8px solid #D64045;
      padding: 0.8rem;
      font-weight: 600;
      margin: 1rem 0;
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div class="poster-container">
  <!-- MODERN POSTER: Bold typography + large buy buttons (top) -->
  <div class="hero-poster">
    <img src="NexusLogo.png" width="50%" height="30%" align="center">
    <br>
    <div class="tagline"><i class="fas fa-microphone-alt"></i> HIP-HOP · ROCK & ROLL · POP <i class="fas fa-guitar"></i></div>
    <!-- LARGE BUY BUTTONS TOP -->
    <div class="buy-banner">
      <button class="btn-buy-large" id="quickBuyBtnTop"><i class="fas fa-ticket-alt"></i> BUY TICKETS</button>
      <button class="btn-buy-large" id="quickGuestlistTop"><i class="fas fa-list-ul"></i> GUESTLIST</button>
    </div>
  </div>

  <!-- MAIN TICKETING FLOW CARD (neubrutalism) -->
  <div class="neubrutalism-card" id="flowContainer">
    <div class="flow-steps">
      <div class="step-badge" id="step1Badge">1. Select Event</div>
      <div class="step-badge" id="step2Badge">2. Choose Ticket Tier</div>
      <div class="step-badge" id="step3Badge">3. Attendee Info</div>
      <div class="step-badge" id="step4Badge">4. Get QR Code</div>
    </div>

    <div id="stepContent"></div>

    <div class="nav-buttons" id="navButtons">
      <button class="btn-nav" id="prevBtn" disabled>← PREV</button>
      <button class="btn-nav btn-primary" id="nextBtn">NEXT →</button>
    </div>
  </div>

  <!-- MODERN POSTER BOTTOM: large buy buttons repeated -->
  <div class="bottom-buy-area">
    <div class="buy-banner">
      <button class="btn-buy-large" id="quickBuyBtnBottom"><i class="fas fa-ticket-alt"></i> GRAB TICKETS NOW</button>
      <button class="btn-buy-large" id="quickGuestlistBottom"><i class="fas fa-users"></i> JOIN GUESTLIST</button>
    </div>
    <p style="margin-top: 1rem; font-weight: 600;">🔥 Three genres · One epic night · Oversized vibes 🔥</p>
  </div>
  <footer>NEXUS EVENTS — QR code generated after purchase</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs2-fix@0.0.1/qrcode.min.js"></script>
<script>
  // ========== HIP-HOP, ROCK & ROLL, POP CONCERTS - PRICES IN PHILIPPINE PESOS (₱) ==========
  const events = [
    { 
      id: 'hiphop_legends', 
      name: '🔥 HIP-HOP LEGENDS', 
      genre: 'hiphop',
      genreIcon: '🎤',
      venue: 'THE BLOCK ARENA', 
      date: 'SAT, MAY 10 · 9PM', 
      description: 'Heavy bass · Cypher sessions · Street vibes',
      tickets: [
        { tier: 'EARLY BIRD', price: 2000, available: true, currency: '₱' },
        { tier: 'GENERAL ADMISSION', price: 3200, available: true, currency: '₱' },
        { tier: 'VIP + MEET & GREET', price: 7000, available: true, currency: '₱' }
      ]
    },
    { 
      id: 'rock_rebellion', 
      name: '🤘 ROCK REBELLION', 
      genre: 'rock',
      genreIcon: '🎸',
      venue: 'THUNDER HALL', 
      date: 'FRI, MAY 23 · 8PM', 
      description: 'Electric guitars · Raw energy · Mosh pits',
      tickets: [
        { tier: 'EARLY BIRD', price: 2200, available: true, currency: '₱' },
        { tier: 'GENERAL ADMISSION', price: 3400, available: true, currency: '₱' },
        { tier: 'VIP BACKSTAGE', price: 7300, available: true, currency: '₱' }
      ]
    },
    { 
      id: 'pop_starlight', 
      name: '✨ POP STARLIGHT', 
      genre: 'pop',
      genreIcon: '🌟',
      venue: 'CRYSTAL DOME', 
      date: 'SUN, JUN 1 · 7PM', 
      description: 'Chart-toppers · Neon visuals · Dance party',
      tickets: [
        { tier: 'EARLY BIRD', price: 1850, available: true, currency: '₱' },
        { tier: 'GENERAL ADMISSION', price: 3000, available: true, currency: '₱' },
        { tier: 'VIP FRONT ROW', price: 6400, available: true, currency: '₱' }
      ]
    }
  ];

  // State machine
  let currentStep = 1;
  let selectedEvent = null;
  let selectedTier = null;
  let attendeeName = '';
  let attendeeEmail = '';
  let qrData = null;

  const stepContentDiv = document.getElementById('stepContent');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const step1Badge = document.getElementById('step1Badge');
  const step2Badge = document.getElementById('step2Badge');
  const step3Badge = document.getElementById('step3Badge');
  const step4Badge = document.getElementById('step4Badge');

  function updateBadges() {
    [step1Badge, step2Badge, step3Badge, step4Badge].forEach((badge, idx) => {
      if (idx+1 === currentStep) badge.classList.add('active');
      else badge.classList.remove('active');
    });
  }

  function resetFlowToStep1() {
    currentStep = 1;
    selectedEvent = null;
    selectedTier = null;
    attendeeName = '';
    attendeeEmail = '';
    qrData = null;
    updateBadges();
    renderStep();
  }

  function renderStep() {
    if (currentStep === 1) renderEventStep();
    else if (currentStep === 2) renderTierStep();
    else if (currentStep === 3) renderInfoStep();
    else if (currentStep === 4) renderQRStep();

    prevBtn.disabled = (currentStep === 1);
    if (currentStep === 4) {
      nextBtn.textContent = '✅ DONE';
    } else {
      nextBtn.textContent = 'NEXT →';
    }
  }

  // STEP 1: SELECT EVENT (genre-themed)
  function renderEventStep() {
    let html = `<div><p style="font-weight:800; margin-bottom:1rem; font-size:1.2rem;">🎟️ CHOOSE YOUR CONCERT EXPERIENCE</p><div class="events-grid">`;
    events.forEach(ev => {
      let genreClass = '';
      if (ev.genre === 'hiphop') genreClass = 'hiphop';
      else if (ev.genre === 'rock') genreClass = 'rock';
      else if (ev.genre === 'pop') genreClass = 'pop';
      
      html += `
        <div class="event-option ${genreClass}" data-event-id='${ev.id}'>
          <div class="genre-icon">${ev.genreIcon}</div>
          <div class="event-name">${ev.name}</div>
          <div class="event-details">
            <i class="fas fa-map-marker-alt"></i> ${ev.venue} &nbsp;|&nbsp; 
            <i class="fas fa-calendar-alt"></i> ${ev.date}
          </div>
          <div class="event-details"><i class="fas fa-music"></i> ${ev.description}</div>
          <span class="genre-tag">${ev.genre.toUpperCase()}</span>
          <button class="btn-oversized select-event-btn" data-id='${ev.id}'>SELECT EVENT →</button>
        </div>
      `;
    });
    html += `</div></div>`;
    stepContentDiv.innerHTML = html;

    document.querySelectorAll('.select-event-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const eventId = btn.getAttribute('data-id');
        const found = events.find(ev => ev.id === eventId);
        if (found) {
          selectedEvent = found;
          currentStep = 2;
          updateBadges();
          renderStep();
        }
      });
    });
  }

  // STEP 2: TICKET TIER (oversized buttons)
  function renderTierStep() {
    if (!selectedEvent) {
      stepContentDiv.innerHTML = `<div class="status-message">⚠️ No event selected. Please restart.</div>`;
      return;
    }
    let html = `<div><p style="font-weight:800; margin-bottom:1rem;">🎫 CHOOSE YOUR TIER — ${selectedEvent.name}</p><div class="tiers-container">`;
    selectedEvent.tickets.forEach((ticket, idx) => {
      const activeClass = (selectedTier && selectedTier.tier === ticket.tier) ? 'active-tier' : '';
      html += `
        <div class="tier-button ${activeClass}" data-tier-index="${idx}">
          <span class="tier-name"><i class="fas fa-ticket-alt"></i> ${ticket.tier}</span>
          <span class="tier-price">${ticket.currency}${ticket.price.toLocaleString()}</span>
        </div>
      `;
    });
    html += `</div><div class="status-message" style="margin-top:0.5rem;">⚡ Oversized buttons — click any tier to select</div></div>`;
    stepContentDiv.innerHTML = html;

    document.querySelectorAll('.tier-button').forEach(el => {
      el.addEventListener('click', (e) => {
        const idx = parseInt(el.getAttribute('data-tier-index'));
        if (!isNaN(idx) && selectedEvent.tickets[idx]) {
          selectedTier = { ...selectedEvent.tickets[idx] };
          renderTierStep();
        }
      });
    });
  }

  // STEP 3: ATTENDEE INFO
  function renderInfoStep() {
    if (!selectedEvent || !selectedTier) {
      stepContentDiv.innerHTML = `<div class="status-message">⚠️ Missing event/tier selection, please go back.</div>`;
      return;
    }
    let html = `
      <div>
        <p style="font-weight:800; margin-bottom:1rem;">📝 ENTER ATTENDEE DETAILS</p>
        <div class="attendee-form">
          <div class="input-group">
            <label>FULL NAME *</label>
            <input type="text" id="attendeeName" placeholder="Enter your full name" value="${escapeHtml(attendeeName)}">
          </div>
          <div class="input-group">
            <label>EMAIL ADDRESS *</label>
            <input type="email" id="attendeeEmail" placeholder="you@example.com" value="${escapeHtml(attendeeEmail)}">
          </div>
          <div class="ticket-summary">
            🎵 ${selectedEvent.name} — ${selectedTier.tier} : ${selectedTier.currency}${selectedTier.price.toLocaleString()}<br>
            📍 ${selectedEvent.venue} · ${selectedEvent.date}
          </div>
        </div>
      </div>
    `;
    stepContentDiv.innerHTML = html;
    const nameInput = document.getElementById('attendeeName');
    const emailInput = document.getElementById('attendeeEmail');
    if (nameInput) nameInput.addEventListener('input', (e) => { attendeeName = e.target.value; });
    if (emailInput) emailInput.addEventListener('input', (e) => { attendeeEmail = e.target.value; });
  }

  // STEP 4: QR CODE
  function renderQRStep() {
    if (!selectedEvent || !selectedTier || !attendeeName.trim() || !attendeeEmail.trim()) {
      stepContentDiv.innerHTML = `<div class="status-message">❌ Missing information. Please go back and complete attendee details.</div>`;
      return;
    }
    const payload = JSON.stringify({
      concert: selectedEvent.name,
      genre: selectedEvent.genre,
      tier: selectedTier.tier,
      name: attendeeName.trim(),
      email: attendeeEmail.trim(),
      price: selectedTier.price,
      currency: selectedTier.currency,
      venue: selectedEvent.venue,
      date: selectedEvent.date,
      timestamp: new Date().toISOString()
    });
    qrData = payload;
    
    setTimeout(() => {
      const canvas = document.getElementById('qrCanvas');
      if (canvas) {
        try {
          new QRCode(canvas, {
            text: qrData,
            width: 180,
            height: 180,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
          });
        } catch(e) { console.warn(e); }
      }
    }, 10);
    
    let html = `
      <div class="qr-card">
        <p style="font-weight:900; font-size:1.5rem;">🎟️ YOUR NEXUS PASS</p>
        <div class="qr-code-box">
          <canvas id="qrCanvas" width="180" height="180"></canvas>
        </div>
        <div class="ticket-summary" style="margin-top:1rem;">
          <i class="fas fa-check-circle"></i> ${selectedEvent.name}<br>
          🎸 ${selectedTier.tier} · ${attendeeName}<br>
          📧 ${attendeeEmail}<br>
          💰 ${selectedTier.currency}${selectedTier.price.toLocaleString()}<br>
          📍 ${selectedEvent.venue} — SCAN QR AT ENTRANCE
        </div>
        <button id="downloadTicketMock" class="btn-oversized" style="margin-top:1.2rem; background:#2c2c2c;"><i class="fas fa-download"></i> SAVE TICKET (QR)</button>
      </div>
    `;
    stepContentDiv.innerHTML = html;
    setTimeout(() => {
      const canvasAgain = document.getElementById('qrCanvas');
      if (canvasAgain && qrData) {
        new QRCode(canvasAgain, {
          text: qrData,
          width: 180,
          height: 180,
          colorDark: "#000000",
          colorLight: "#ffffff"
        });
      }
      const downloadBtn = document.getElementById('downloadTicketMock');
      if (downloadBtn) {
        downloadBtn.addEventListener('click', () => {
          alert(`🎫 ${selectedEvent.name} ticket saved!\n💰 Amount: ${selectedTier.currency}${selectedTier.price.toLocaleString()}\nShow QR at venue: ${selectedEvent.venue}\nEnjoy the show! 🎵`);
        });
      }
    }, 50);
  }

  function onNext() {
    if (currentStep === 1) {
      if (!selectedEvent) {
        alert('Please select a concert!');
        return false;
      }
      currentStep = 2;
      updateBadges();
      renderStep();
      return true;
    }
    else if (currentStep === 2) {
      if (!selectedTier) {
        alert('Please select a ticket tier!');
        return false;
      }
      currentStep = 3;
      updateBadges();
      renderStep();
      return true;
    }
    else if (currentStep === 3) {
      if (!attendeeName.trim() || !attendeeEmail.trim()) {
        alert('Please enter your full name and email address.');
        return false;
      }
      if (!attendeeEmail.includes('@') || !attendeeEmail.includes('.')) {
        alert('Enter a valid email address.');
        return false;
      }
      currentStep = 4;
      updateBadges();
      renderStep();
      return true;
    }
    else if (currentStep === 4) {
      alert(`🎸🔥 WELCOME TO NEXUS CONCERTS! 🔥🎤\nYour ticket is ready for ${selectedEvent.name}.\n💰 Total: ${selectedTier.currency}${selectedTier.price.toLocaleString()}\nShow QR at ${selectedEvent.venue}. Enjoy the show!`);
      return true;
    }
    return true;
  }

  function onPrev() {
    if (currentStep > 1) {
      currentStep--;
      updateBadges();
      renderStep();
    }
  }

  function startBuyFlow() {
    resetFlowToStep1();
    document.getElementById('flowContainer').scrollIntoView({ behavior: 'smooth' });
  }

  function showGuestlist() {
    const guestHtml = `
      <div style="position:fixed; top:20%; left:50%; transform:translate(-50%,-20%); background:white; border:4px solid black; box-shadow:20px 20px 0 black; z-index:1000; max-width:400px; width:90%; padding:1.8rem; font-weight:bold;">
        <h2 style="font-weight:900;">✨ NEXUS GUESTLIST ✨</h2>
        <p>Hip-Hop · Rock · Pop — Priority access & exclusive merch</p>
        <input type="email" placeholder="your@email.com" id="glEmail" style="width:100%; padding:10px; margin:10px 0; border:2px solid black;">
        <button id="glJoinBtn" style="background:#FFCF40; border:2px solid black; padding:12px; font-weight:800; width:100%;">JOIN GUESTLIST</button>
        <button id="glClose" style="margin-top:10px; background:#eee; width:100%; padding:8px;">CLOSE</button>
      </div>
      <div id="glOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;"></div>
    `;
    const div = document.createElement('div');
    div.id = 'guestlistModal';
    div.innerHTML = guestHtml;
    document.body.appendChild(div);
    const closeModal = () => div.remove();
    document.getElementById('glClose')?.addEventListener('click', closeModal);
    document.getElementById('glJoinBtn')?.addEventListener('click', () => {
      const email = document.getElementById('glEmail')?.value;
      if(email && email.includes('@')) alert(`🎵 ${email} added to Nexus guestlist! Check your inbox for updates.`);
      else alert("Please enter a valid email.");
      closeModal();
    });
    document.getElementById('glOverlay')?.addEventListener('click', closeModal);
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  nextBtn.addEventListener('click', onNext);
  prevBtn.addEventListener('click', onPrev);
  document.getElementById('quickBuyBtnTop')?.addEventListener('click', startBuyFlow);
  document.getElementById('quickBuyBtnBottom')?.addEventListener('click', startBuyFlow);
  document.getElementById('quickGuestlistTop')?.addEventListener('click', showGuestlist);
  document.getElementById('quickGuestlistBottom')?.addEventListener('click', showGuestlist);

  resetFlowToStep1();
</script>
</body>
</html>
